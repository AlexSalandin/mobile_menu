        <div class="menu__logo">
          <img src="images/group.png" alt="CPS" />

        <button class="btn menu__btn">

        </button>
      </header>

      <!-- NAV -->
      <nav class="menu__nav">
        <ul class="menu__list">
          <li class="menu__item">
            <a href="#" class="menu__link menu__link--muted">Ремонт техники</a>

          </li>

          <li class="menu__item">
            <a href="#" class="menu__link">Контакты</a>
          </li>
        </ul>

      <!-- FOOTER -->

        <div class="active menu__actions">
          <button class="btn menu__btn">
            <img src="images/chat copy.png" alt="" />
          </button>
          <button class="btn menu__btn">
            <img src="images/chat.png" alt="" />
          </button>
          <button class="btn menu__btn">
            <img src="images/profile.png" alt="" />
          </button>
        </div>

        <a href="mailto:mail@cps.com" class="menu__mail"> mail@cps.com </a>

        <div class="menu__phone">8 800 890 8900</div>

        <div class="menu__lang">
